<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Kimi Cookbook site mark — the book's 月之暗面 cover as an app tile:
       black rounded tile, ghost disc, one lit paper crescent on the right
       limb, and a single satellite in Kimi blue. Same composition as the
       header logo (components/SiteHeader.tsx · SiteLogo). -->
  <rect width="512" height="512" rx="112" fill="#0E0E13"/>
  <mask id="moon-bite">
    <rect x="64" y="64" width="384" height="384" fill="#fff"/>
    <circle cx="230" cy="245" r="137" fill="#000"/>
  </mask>
  <circle cx="256" cy="256" r="144" fill="#1B1B25"/>
  <circle cx="256" cy="256" r="144" fill="#EFE8DC" mask="url(#moon-bite)"/>
  <circle cx="379" cy="144" r="47" fill="#1783FF" opacity="0.18"/>
  <circle cx="379" cy="144" r="28" fill="#1783FF"/>
</svg>
