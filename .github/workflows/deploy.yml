name: Aliyun CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    name: Quality gates
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: kimi-cookbook-ci-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          DEPLOYMENT_VERSION: ${{ github.sha }}
        run: npm run build

  deploy:
    name: Deploy production
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment:
      name: production
      url: ${{ vars.NEXT_PUBLIC_SITE_URL }}
    concurrency:
      group: kimi-cookbook-production
      cancel-in-progress: false
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
      APP_PORT: ${{ vars.APP_PORT || '3010' }}
      PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'kimi-cookbook' }}
      KEEP_RELEASES: ${{ vars.KEEP_RELEASES || '5' }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_KNOWN_HOSTS: ${{ vars.DEPLOY_KNOWN_HOSTS }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Validate production configuration
        run: |
          set -Eeuo pipefail
          missing=0
          for name in DEPLOY_PATH NEXT_PUBLIC_SITE_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is not configured as a repository Actions variable."
              missing=1
            fi
          done
          (( missing == 0 )) || exit 1

          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ && "$DEPLOY_PATH" != "/" && ${#DEPLOY_PATH} -gt 5 ]] || {
            echo "::error::DEPLOY_PATH must be a safe absolute path without spaces."
            exit 1
          }
          [[ "$DEPLOY_SSH_PORT" =~ ^[0-9]{1,5}$ ]] || exit 1
          [[ "$APP_PORT" =~ ^[0-9]{2,5}$ ]] || exit 1
          [[ "$PM2_APP_NAME" =~ ^[A-Za-z0-9._-]+$ ]] || exit 1
          [[ "$KEEP_RELEASES" =~ ^[0-9]+$ ]] || exit 1
          (( DEPLOY_SSH_PORT >= 1 && DEPLOY_SSH_PORT <= 65535 )) || exit 1
          (( APP_PORT >= 1024 && APP_PORT <= 65535 )) || exit 1
          (( KEEP_RELEASES >= 3 && KEEP_RELEASES <= 20 )) || exit 1
          [[ "$NEXT_PUBLIC_SITE_URL" =~ ^https://[^/]+$ ]] || {
            echo "::error::NEXT_PUBLIC_SITE_URL must be an https origin without a trailing slash."
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build standalone release
        env:
          DEPLOYMENT_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Package release
        run: |
          set -Eeuo pipefail
          rm -rf .release
          mkdir -p .release/.next .release/ops
          cp -a .next/standalone/. .release/
          rm -rf .release/.next/static .release/public
          cp -a .next/static .release/.next/static
          cp -a public .release/public
          install -m 644 ops/ecosystem.config.cjs .release/ecosystem.config.cjs
          install -m 755 ops/analytics-rollup.sh .release/ops/analytics-rollup.sh
          install -m 755 ops/deploy-release.sh .release/ops/deploy-release.sh
          install -m 755 ops/nginx-cache-doctor.mjs .release/ops/nginx-cache-doctor.mjs
          printf '%s\n' "$GITHUB_SHA" > .release/RELEASE
          (
            cd .release
            find . -type f ! -path './RELEASE.sha256' -print0 \
              | LC_ALL=C sort -z \
              | xargs -0 sha256sum > RELEASE.sha256
          )

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          missing=0
          for name in \
            DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY DEPLOY_KNOWN_HOSTS; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is not configured as a repository Actions secret."
              missing=1
            fi
          done
          (( missing == 0 )) || exit 1

          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || {
            echo "::error::DEPLOY_HOST must be a hostname or IPv4 address."
            exit 1
          }
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]] || {
            echo "::error::DEPLOY_USER is not a safe Linux username."
            exit 1
          }
          [[ "$DEPLOY_SSH_PRIVATE_KEY" == *"BEGIN "*"PRIVATE KEY"* ]] || {
            echo "::error::DEPLOY_SSH_PRIVATE_KEY must contain a private key."
            exit 1
          }

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"

      - name: Upload release
        run: |
          set -Eeuo pipefail
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "command -v rsync >/dev/null && mkdir -p '$DEPLOY_PATH/incoming/$GITHUB_SHA' '$DEPLOY_PATH/releases' '$DEPLOY_PATH/shared/data'"

          link_dest=()
          if ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -L '$DEPLOY_PATH/current'"; then
            link_dest=("--link-dest=$DEPLOY_PATH/current")
          fi

          rsync \
            -rlpz \
            --checksum \
            --delete-delay \
            "${link_dest[@]}" \
            -e "ssh -i $HOME/.ssh/deploy_key -p $DEPLOY_SSH_PORT -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            .release/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/incoming/$GITHUB_SHA/"

      - name: Sync runtime configuration
        env:
          ANALYTICS_SECRET: ${{ secrets.ANALYTICS_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          ANALYTICS_RETENTION_DAYS: ${{ vars.ANALYTICS_RETENTION_DAYS || '90' }}
          RUNTIME_PATH: ${{ vars.RUNTIME_PATH }}
        run: |
          set -Eeuo pipefail

          missing=0
          for name in ANALYTICS_SECRET CRON_SECRET; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is not configured as an Actions secret."
              missing=1
            fi
          done
          (( missing == 0 )) || exit 1

          (( ${#ANALYTICS_SECRET} >= 32 )) || {
            echo "::error::ANALYTICS_SECRET must contain at least 32 characters."
            exit 1
          }
          (( ${#CRON_SECRET} >= 32 )) || {
            echo "::error::CRON_SECRET must contain at least 32 characters."
            exit 1
          }
          [[ "$ANALYTICS_SECRET" != "$CRON_SECRET" ]] || {
            echo "::error::ANALYTICS_SECRET and CRON_SECRET must be different."
            exit 1
          }
          [[ "$ANALYTICS_RETENTION_DAYS" =~ ^[0-9]+$ ]] || {
            echo "::error::ANALYTICS_RETENTION_DAYS must be numeric."
            exit 1
          }
          (( ANALYTICS_RETENTION_DAYS >= 1 && ANALYTICS_RETENTION_DAYS <= 3650 )) || {
            echo "::error::ANALYTICS_RETENTION_DAYS must be between 1 and 3650."
            exit 1
          }

          if [[ -n "$DATABASE_URL" || -n "$DATABASE_AUTH_TOKEN" ]]; then
            [[ "$DATABASE_URL" =~ ^(libsql|https|mysql|mysqls):// ]] || {
              echo "::error::DATABASE_URL must use the libsql://, https://, or mysql:// scheme."
              exit 1
            }
            if [[ "$DATABASE_URL" =~ ^(libsql|https):// && -z "$DATABASE_AUTH_TOKEN" ]]; then
              echo "::error::DATABASE_AUTH_TOKEN is required for libsql:// and https:// DATABASE_URL."
              exit 1
            fi
            if [[ "$DATABASE_URL" =~ ^mysqls?:// && -n "$DATABASE_AUTH_TOKEN" ]]; then
              echo "::error::DATABASE_AUTH_TOKEN is not used with mysql:// URLs — put credentials in the URL."
              exit 1
            fi
          fi

          if [[ "$DATABASE_URL" =~ ^(libsql|https):// ]]; then
            node --input-type=module -e '
              import { createClient } from "@libsql/client";
              const client = createClient({
                url: process.env.DATABASE_URL,
                authToken: process.env.DATABASE_AUTH_TOKEN,
              });
              try {
                await client.execute("SELECT 1");
              } finally {
                client.close();
              }
            '
            echo "Database credential preflight passed."
          elif [[ "$DATABASE_URL" =~ ^mysqls?:// ]]; then
            db_host="$(node --input-type=module -e '
              console.log(new URL(process.env.DATABASE_URL).hostname)
            ')"
            if [[ "$db_host" == "127.0.0.1" || "$db_host" == "localhost" ]]; then
              # Loopback MySQL on the deploy host — the runner can't reach it
              # (its 127.0.0.1 is itself). Tunnel through the deploy SSH
              # connection and preflight through it.
              tunnel_pid=""
              cleanup_tunnel() {
                [[ -n "$tunnel_pid" ]] && kill "$tunnel_pid" 2>/dev/null || true
              }
              trap cleanup_tunnel EXIT
              ssh \
                -i "$HOME/.ssh/deploy_key" \
                -p "$DEPLOY_SSH_PORT" \
                -o BatchMode=yes \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                -o ExitOnForwardFailure=yes \
                -N -L 3307:127.0.0.1:3306 \
                "$DEPLOY_USER@$DEPLOY_HOST" &
              tunnel_pid=$!
              sleep 3
              node --input-type=module -e '
                import mysql from "mysql2/promise";
                const url = new URL(process.env.DATABASE_URL);
                url.port = "3307"; // through the SSH tunnel to the deploy host
                const pool = mysql.createPool(url.toString());
                try { await pool.query("SELECT 1"); } finally { await pool.end(); }
              '
              cleanup_tunnel
              trap - EXIT
              echo "MySQL credential preflight passed (via SSH tunnel)."
            else
              # Remote MySQL (e.g., Aliyun RDS): the runner can't be whitelisted
              # reliably, so preflight FROM the deploy host — it is the network
              # the app will actually use. URL parts are base64-encoded on the
              # runner (immune to shell-special characters in the password)
              # and decoded on the box; MYSQL_PWD keeps the password out of
              # the process list.
              node --input-type=module -e '
                const u = new URL(process.env.DATABASE_URL);
                const b64 = (s) => Buffer.from(s).toString("base64");
                console.log(`RDS_HOST_B64=${b64(u.hostname)}`);
                console.log(`RDS_PORT_B64=${b64(u.port || "3306")}`);
                console.log(`RDS_USER_B64=${b64(decodeURIComponent(u.username))}`);
                console.log(`RDS_PASS_B64=${b64(decodeURIComponent(u.password))}`);
                console.log(`RDS_DB_B64=${b64(u.pathname.replace(/^\//, ""))}`);
              ' | ssh \
                -i "$HOME/.ssh/deploy_key" \
                -p "$DEPLOY_SSH_PORT" \
                -o BatchMode=yes \
                -o IdentitiesOnly=yes \
                -o StrictHostKeyChecking=yes \
                "$DEPLOY_USER@$DEPLOY_HOST" \
                "set -Eeuo pipefail; \
                 eval \"\$(cat)\"; \
                 RDS_HOST=\"\$(printf %s \"\$RDS_HOST_B64\" | base64 -d)\"; \
                 RDS_PORT=\"\$(printf %s \"\$RDS_PORT_B64\" | base64 -d)\"; \
                 RDS_USER=\"\$(printf %s \"\$RDS_USER_B64\" | base64 -d)\"; \
                 RDS_PASS=\"\$(printf %s \"\$RDS_PASS_B64\" | base64 -d)\"; \
                 RDS_DB=\"\$(printf %s \"\$RDS_DB_B64\" | base64 -d)\"; \
                 MYSQL_PWD=\"\$RDS_PASS\" mysql -h \"\$RDS_HOST\" -P \"\$RDS_PORT\" \
                   -u \"\$RDS_USER\" \"\$RDS_DB\" -e 'SELECT 1'"
              echo "MySQL credential preflight passed (from deploy host)."
            fi
          fi

          {
            if [[ -n "$RUNTIME_PATH" ]]; then
              printf 'PATH=%q\n' "$RUNTIME_PATH"
            fi
            printf 'ANALYTICS_SECRET=%q\n' "$ANALYTICS_SECRET"
            printf 'CRON_SECRET=%q\n' "$CRON_SECRET"
            printf 'ANALYTICS_RETENTION_DAYS=%q\n' "$ANALYTICS_RETENTION_DAYS"
            if [[ -n "$DATABASE_URL" ]]; then
              printf 'DATABASE_URL=%q\n' "$DATABASE_URL"
            fi
            if [[ -n "$DATABASE_AUTH_TOKEN" ]]; then
              printf 'DATABASE_AUTH_TOKEN=%q\n' "$DATABASE_AUTH_TOKEN"
            fi
          } | ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -Eeuo pipefail; \
             shared_dir='$DEPLOY_PATH/shared'; \
             mkdir -p \"\$shared_dir/data\"; \
             chmod 700 \"\$shared_dir\"; \
             temp_file=\"\$shared_dir/.env.production.\$\$\"; \
             trap 'rm -f -- \"\$temp_file\"' EXIT; \
             cat > \"\$temp_file\"; \
             chmod 600 \"\$temp_file\"; \
             mv -f -- \"\$temp_file\" \"\$shared_dir/.env.production\"; \
             trap - EXIT"

      - name: Activate release
        run: |
          set -Eeuo pipefail
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_SSH_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s -- '$DEPLOY_PATH' '$GITHUB_SHA' '$PM2_APP_NAME' '$APP_PORT' '/api/health' '$KEEP_RELEASES'" \
            < ops/deploy-release.sh

      - name: Verify public URL
        run: |
          set -Eeuo pipefail
          site_url="${NEXT_PUBLIC_SITE_URL%/}"
          expected_dpl="data-dpl-id=\"${GITHUB_SHA}\""
          cache_buster="${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          # Landing page plus a chapter page: the 2026-07 staleness incident
          # surfaced on chapter HTML, so spot-check more than the home route.
          # The chapter slug is pinned by tests/deploy-workflow.test.ts.
          pages=("$site_url/" "$site_url/books/kimi/01-intro")

          public_health_ok=0
          for attempt in {1..8}; do
            body="$(curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 15 \
              "$site_url/api/health" 2>/dev/null || true)"
            if HEALTH_BODY="$body" EXPECTED_SHA="$GITHUB_SHA" node -e '
              const health = JSON.parse(process.env.HEALTH_BODY);
              const expected = process.env.EXPECTED_SHA;
              const matches =
                health.ok === true &&
                health.version === expected &&
                health.releaseVersion === expected &&
                health.buildVersion === expected &&
                health.checks?.runtimeVersion === true &&
                health.checks?.releaseVersion === true &&
                health.checks?.buildVersion === true;
              if (!matches) process.exit(1);
            ' 2>/dev/null; then
              echo "Public health check passed: $site_url"
              public_health_ok=1
              break
            fi
            sleep 3
          done
          if (( public_health_ok == 0 )); then
            echo "::error::Public health check did not reach release $GITHUB_SHA."
            exit 1
          fi

          # Retry loop: the health probe above proves the API is up, but these
          # page fetches cross the public network — a transient runner-side
          # failure must not mark a good deploy red.
          html_verified=0
          last_error="public HTML verification did not run"
          for attempt in {1..4}; do
            html_verified=1
            for page in "${pages[@]}"; do
              canonical_body="$(curl --fail --silent --show-error \
                --connect-timeout 5 --max-time 20 \
                "$page" 2>/dev/null || true)"
              cache_busted_body="$(curl --fail --silent --show-error \
                --connect-timeout 5 --max-time 20 \
                "${page}?deploy-check=${cache_buster}" 2>/dev/null || true)"

              observed_canonical_dpl="$(
                grep -o 'data-dpl-id="[0-9a-f]*"' <<<"$canonical_body" \
                  | head -1 || true
              )"
              observed_busted_dpl="$(
                grep -o 'data-dpl-id="[0-9a-f]*"' <<<"$cache_busted_body" \
                  | head -1 || true
              )"

              if [[ -z "$canonical_body" || -z "$cache_busted_body" ]]; then
                last_error="Could not fetch $page from the public URL."
                html_verified=0
                break
              fi
              if [[ "$cache_busted_body" != *"$expected_dpl"* ]]; then
                last_error="Cache-busted $page came from the wrong build: ${observed_busted_dpl:-missing deployment id}."
                html_verified=0
                break
              fi
              if [[ "$canonical_body" != *"$expected_dpl"* ]]; then
                last_error="Canonical $page is stale: ${observed_canonical_dpl:-missing deployment id}; cache-busted origin is $GITHUB_SHA. Check reverse-proxy caches."
                html_verified=0
                break
              fi
            done
            (( html_verified == 1 )) && break
            (( attempt < 4 )) && sleep 5
          done

          if (( html_verified == 0 )); then
            echo "::error::$last_error"
            exit 1
          fi

          echo "Public canonical and cache-busted HTML both match $GITHUB_SHA on ${#pages[@]} pages."

      - name: Remove SSH material
        if: always()
        run: rm -f "$HOME/.ssh/deploy_key" "$HOME/.ssh/known_hosts"
