<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Kimi Cookbook 宣传海报 · 01 封面</title>
<link rel="stylesheet" href="base.css">
<style>
  /* 01 封面独有:右上出血的月之暗面大圆盘 + 超大标题 */
  .moon-disc {
    position: absolute;
    top: -110px;
    right: -150px;
    width: 620px;
    height: 620px;
    border-radius: 50%;
    background: var(--disc);
  }
  .moon-disc svg { display: block; width: 100%; height: 100%; }

  .headline {
    position: absolute;
    left: 72px;
    top: 400px;
    width: 936px;
  }
  .kicker { margin-bottom: 48px; }
  h1 {
    font-size: 116px;
    line-height: 1.32;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  h1 .kimi { color: var(--blue); }
  .sub {
    margin-top: 56px;
    font-size: 36px;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .sub .rule {
    display: inline-block;
    width: 72px;
    height: 2px;
    background: var(--blue);
    vertical-align: middle;
    margin-right: 24px;
    transform: translateY(-4px);
  }
</style>
</head>
<body>

  <div class="moon-disc" aria-hidden="true">
    <svg viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">
      <mask id="p1-bite">
        <rect x="100" y="200" width="400" height="400" fill="#fff"/>
        <circle cx="288" cy="386" r="143" fill="#000"/>
      </mask>
      <circle cx="310" cy="400" r="150" fill="#1B1B25"/>
      <circle cx="310" cy="400" r="150" fill="#EFE8DC" mask="url(#p1-bite)"/>
      <circle cx="415" cy="290" r="49" fill="#1783FF" opacity="0.18"/>
      <circle cx="415" cy="290" r="29" fill="#1783FF"/>
    </svg>
  </div>

  <header class="masthead">
    <div class="brand">
      <div class="brand-tile" aria-hidden="true">
        <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" fill="#0E0E13"/>
          <mask id="p1-tile-bite">
            <rect x="64" y="64" width="384" height="384" fill="#fff"/>
            <circle cx="230" cy="245" r="137" fill="#000"/>
          </mask>
          <circle cx="256" cy="256" r="144" fill="#1B1B25"/>
          <circle cx="256" cy="256" r="144" fill="#EFE8DC" mask="url(#p1-tile-bite)"/>
          <circle cx="379" cy="144" r="47" fill="#1783FF" opacity="0.18"/>
          <circle cx="379" cy="144" r="28" fill="#1783FF"/>
        </svg>
      </div>
      <div class="brand-name">KIMI COOKBOOK</div>
      <div class="brand-serial">NO. 01</div>
    </div>
  </header>

  <main class="headline">
    <div class="kicker">
      <span class="k-tile"><img src="../assets/brand/kimi.webp" alt="Kimi"></span>
      <span>一次开发 · 三端上线</span>
    </div>
    <h1>我用 <span class="kimi">Kimi</span>,<br>写了一本讲透<br><span class="kimi">Kimi</span> 的书。</h1>
    <p class="sub"><span class="rule"></span>从长文本到一套 agent 栈 · 10 章 · 代码开源</p>
  </main>

  <footer class="colophon">
    <div class="endpoint">
      <div class="label">在线书</div>
      <div class="value">kimi.read.wiki<small>网页即读,支持导出 PDF</small></div>
    </div>
    <div class="endpoint">
      <div class="label">网站应用</div>
      <div class="value">中英双语<small>Agent 可读的 llms.md</small></div>
    </div>
    <div class="endpoint">
      <div class="label">小程序</div>
      <div class="value">扫码体验<small>小程序码在末页</small></div>
    </div>
  </footer>

</body>
</html>
